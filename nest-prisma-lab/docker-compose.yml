services:
  app:
    build: .
    expose:
      - '3000'
    environment: # change to be your .env 
      DATABASE_URL: mysql://ict_admin:ict555@db:3306/ICTHotel?allowPublicKeyRetrieval=true
      JWT_SECRET: secretKey
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet

  db:
    image: mariadb:10.11
    environment: # change to be your sql user
      MARIADB_ROOT_PASSWORD: root 
      MARIADB_DATABASE: ICTHotel
      MARIADB_USER: ict_admin
      MARIADB_PASSWORD: ict555
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - appnet
  redis:
    image: redis
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
    networks:
      - appnet
  nginx:
    image: nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '80:80'
    depends_on:
      - app
    networks:
      - appnet

volumes:
  mariadb_data:

networks:
  appnet:
